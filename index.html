<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homebrew Editor</title>
    <link rel="stylesheet" href="style.css">
    
    <style id="user-styles"></style>
</head>
<body>

    <div class="editorLayout">
        
        <div class="inputPanel">
            <div class="tabContainer">
                <button class="tab-btn active" id="tab-md">Markdown</button>
                <button class="tab-btn" id="tab-css">Custom CSS</button>

                <div class="pageControl">
                    <input type="number" id="currentPage">
                    /
                    <input type="number" id="totalPages" disabled>
                    <button id="goToPageBtn">Go</button>
                </div>

                <div class="arrowButtons">
                    <button id="textToPreview" title="Jump to location in preview"> → </button>
                    <button id="previewToText" title="Jump to location in editor"> ← </button>
                </div>
            </div>
            
            <textarea id="markdownInput" class="editorTextarea"></textarea>
            
            <textarea id="cssInput" class="editorTextarea hidden" placeholder="/* Write custom CSS here... Example: */\nh1 { color: #58180d; }"></textarea>
        </div>

        <div class="previewPanel">
            <div class="documentContainer">
                </div>
            <div class="saveLoadButtons">
                <button id="saveButton" title="Save CTRL+S">💾</button>
                <button id="loadButton" title="Load">⏏️</button>
                <input id="fileInput" type="file" accept=".txt,text/plain" style="display:none">
            </div>
        </div>

    </div>

    <script src="marked.min.js"></script>
    <script src="marked-extended-tables.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
